{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<h2>Create a new band</h2>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label">Band Name</label>
    <input name="name" class="form-control" value="{{ request.form.get('name', '') }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Band Timezone</label>
    <select name="timezone" class="form-select" required>
      {% for timezone_name in timezone_options %}
      <option value="{{ timezone_name }}" {% if selected_timezone == timezone_name %}selected{% endif %}>{{ timezone_name|timezone_label }}</option>
      {% endfor %}
    </select>
    <div class="form-text">All gig dates and times for this band will be interpreted using this timezone.</div>
  </div>
  <button class="btn btn-secondary">Create Band</button>
</form>
</div></div>
{% endblock %}
