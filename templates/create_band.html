{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<h2>Create a new band</h2>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label">Band Name</label>
    <input name="name" class="form-control" value="{{ request.form.get('name', '') }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Band Timezone</label>
    <select name="timezone" class="form-select" required>
      {% for timezone_name in timezone_options %}
      <option value="{{ timezone_name }}" {% if selected_timezone == timezone_name %}selected{% endif %}>{{ timezone_name|timezone_label }}</option>
      {% endfor %}
    </select>
    <div class="form-text">All gig dates and times for this band will be interpreted using this timezone.</div>
  </div>
  <div class="form-check form-switch mb-3">
    <input class="form-check-input" type="checkbox" id="rehearsal-enabled" name="rehearsal_enabled" {% if rehearsal_enabled %}checked{% endif %}>
    <label class="form-check-label" for="rehearsal-enabled">Enable weekly rehearsals</label>
  </div>
  <div id="rehearsal-fields" class="{% if not rehearsal_enabled %}d-none{% endif %}">
    <div class="mb-3">
      <label class="form-label">Rehearsal Day</label>
      <select class="form-select" name="rehearsal_weekday">
        <option value="">-- Select day --</option>
        {% for weekday_value, weekday_label in weekday_options %}
        <option value="{{ weekday_value }}" {% if rehearsal_weekday == weekday_value %}selected{% endif %}>{{ weekday_label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Rehearsal Location</label>
      <input name="rehearsal_location" class="form-control" value="{{ rehearsal_location or '' }}" placeholder="Optional location">
    </div>
    <div class="row g-2">
      <div class="col-md-6 mb-3">
        <label class="form-label">Rehearsal Start Time</label>
        <input name="rehearsal_start_time" type="time" class="form-control" value="{{ rehearsal_start_time or '' }}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Rehearsal End Time</label>
        <input name="rehearsal_end_time" type="time" class="form-control" value="{{ rehearsal_end_time or '' }}">
      </div>
    </div>
  </div>
  <button class="btn btn-secondary">Create Band</button>
</form>
</div></div>
{% endblock %}
{% block scripts %}
<script>
const rehearsalToggle = document.getElementById('rehearsal-enabled');
const rehearsalFields = document.getElementById('rehearsal-fields');
rehearsalToggle?.addEventListener('change', (event) => {
  rehearsalFields?.classList.toggle('d-none', !event.target.checked);
});
</script>
{% endblock %}
