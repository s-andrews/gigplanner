{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<h2>Create a new band</h2>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
<form method="post" class="card card-body">
  <div class="mb-3"><label class="form-label">Band Name</label><input name="name" class="form-control" required></div>
  <button class="btn btn-secondary">Create Band</button>
</form>
</div></div>
{% endblock %}
