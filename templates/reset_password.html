{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
<div class="col-md-6">
<div class="auth-page-title">
  <a href="{{ url_for('index') }}" aria-label="Go to home page">
    <img
      src="{{ url_for('static', filename='images/gig_planner_logo.png') }}"
      alt="Gig Planner"
      class="auth-page-logo"
    >
  </a>
  <h2 class="mb-0">Set your password</h2>
</div>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
{% if not invalid_token %}
<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label">New password</label>
    <input type="password" name="password" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Confirm password</label>
    <input type="password" name="confirm_password" class="form-control" required>
  </div>
  <button class="btn btn-secondary">Set Password</button>
</form>
{% endif %}
<div class="mt-3">
  <a class="text-muted text-decoration-underline" href="{{ url_for('forgot_password') }}">Request a new reset link</a>
</div>
</div></div>
{% endblock %}
