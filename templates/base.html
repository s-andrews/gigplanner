<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gig Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
{% if show_navbar|default(true) %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
      <img
        src="{{ url_for('static', filename='images/gig_planner_logo.png') }}"
        alt="Gig Planner"
        class="navbar-brand-logo"
      >
    </a>
    {% if current_user %}
    <div class="d-flex flex-wrap align-items-center gap-2">
      <a class="btn btn-secondary btn-sm" href="{{ url_for('dashboard') }}">Dashboard</a>
    </div>
    <div class="ms-auto d-flex flex-wrap align-items-center gap-2">
      <span class="text-light">{{ current_user['name'] }}</span>
      <a class="btn btn-secondary btn-sm" href="{{ url_for('profile') }}">My Details</a>
      <a class="btn btn-secondary btn-sm" href="{{ url_for('logout') }}">Logout</a>
    </div>
    {% endif %}
  </div>
</nav>
{% endif %}
<main class="container pb-5">
  {% block content %}{% endblock %}
</main>
<footer class="site-footer">
  <div class="container">
    If you find any problems with this site, please report them on the
    <a href="https://github.com/s-andrews/gigplanner/issues" target="_blank" rel="noopener noreferrer">GitHub issues page</a>.
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
