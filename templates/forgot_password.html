{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
<div class="col-md-6">
<div class="auth-page-title">
  <a href="{{ url_for('index') }}" aria-label="Go to home page">
    <img
      src="{{ url_for('static', filename='images/gig_planner_logo.png') }}"
      alt="Gig Planner"
      class="auth-page-logo"
    >
  </a>
  <h2 class="mb-0">Reset your password</h2>
</div>
{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
{% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}
<form method="post" class="card card-body">
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" name="email" class="form-control" value="{{ email or '' }}" required>
  </div>
  <button class="btn btn-secondary">Send Reset Link</button>
</form>
<div class="mt-3">
  <a class="text-muted text-decoration-underline" href="{{ url_for('login') }}">Back to log in</a>
</div>
</div></div>
{% endblock %}
